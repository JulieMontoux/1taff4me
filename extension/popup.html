<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1taff4me</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111827;
      background: #fff;
      width: 300px;
      min-height: 100px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #f3f4f6;
      background: #7c3aed;
      color: white;
    }
    .header-logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header-sub {
      font-size: 11px;
      opacity: 0.8;
      margin-left: auto;
    }

    .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 99px;
    }
    .badge-ok { background: #dcfce7; color: #15803d; }
    .badge-warn { background: #fef3c7; color: #92400e; }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .info-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 9px 11px;
    }
    .info-title {
      font-weight: 600;
      font-size: 13px;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .info-sub {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      outline: none;
      color: #374151;
      background: white;
    }
    input[type="text"]:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px #ede9fe; }

    .btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .footer {
      display: flex;
      justify-content: flex-end;
      padding: 0 14px 10px;
    }
    .link {
      font-size: 11px;
      color: #9ca3af;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .link:hover { color: #7c3aed; }

    #error {
      font-size: 11px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 7px 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-logo">1taff4me</span>
    <span class="header-sub" id="site-badge"></span>
  </div>

  <div class="body">
    <div id="status"></div>

    <div id="job-info" style="display:none;">
      <div class="info-card">
        <div class="info-title" id="job-title">—</div>
        <div class="info-sub" id="job-company">—</div>
      </div>
    </div>

    <div id="error"></div>

    <button class="btn btn-primary" id="add-btn" disabled>
      Ajouter à 1taff4me
    </button>
  </div>

  <div class="footer">
    <button class="link" id="options-btn">Configurer l'URL de l'app →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
